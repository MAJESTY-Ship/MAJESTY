<!DOCTYPE html>
<html>
<head>
  <title>Website Anggota</title>
</head>
<body>
  <h1>Selamat datang di Website Laporan</h1>
  <p>Silakan login atau daftar untuk melihat laporan pribadi.</p>

  <!-- Bagian Form Registrasi & Login -->
  <div id="authForms">
    <!-- Form Registrasi -->
    <h2>Form Registrasi Anggota</h2>
    <form id="registerForm">
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <button type="button" onclick="togglePassword('regPassword')">👁️</button>
      <button type="submit">Daftar</button>
    </form>
    <p id="registerStatus"></p>

    <!-- Form Login -->
    <h2>Form Login Anggota</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="button" onclick="togglePassword('loginPassword')">👁️</button>
      <button type="submit">Login</button>
    </form>
    <p id="loginStatus"></p>
  </div>

  <!-- Bagian Laporan Anggota (disembunyikan dulu) -->
  <div id="laporanAnggota" style="display:none;">
    <h2>Laporan Anggota</h2>
    <p>Selamat datang, <span id="userEmail"></span>!</p>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Script Toggle Password -->
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
      } else {
        input.type = "password";
      }
    }
  </script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>

  <script>
    // Konfigurasi Firebase (isi dengan data dari Firebase Console)
    const firebaseConfig = {
      apiKey: "API_KEY_KAMU",
      authDomain: "PROJECT_ID.firebaseapp.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    // Inisialisasi Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Registrasi
    document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          document.getElementById("registerStatus").innerText = "Registrasi berhasil!";
        })
        .catch((error) => {
          document.getElementById("registerStatus").innerText = "Error: " + error.message;
        });
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          document.getElementById("loginStatus").innerText = "Login berhasil!";
          
          // Sembunyikan form login & registrasi
          document.getElementById("authForms").style.display = "none";
          
          // Tampilkan laporan anggota
          document.getElementById("laporanAnggota").style.display = "block";
          document.getElementById("userEmail").innerText = userCredential.user.email;
        })
        .catch((error) => {
          document.getElementById("loginStatus").innerText = "Error: " + error.message;
        });
    });

    // Logout
    function logout(){
      auth.signOut().then(() => {
        // Tampilkan kembali form login & registrasi
        document.getElementById("authForms").style.display = "block";
        document.getElementById("laporanAnggota").style.display = "none";
      });
    }
  </script>
</body>
</html>
