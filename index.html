<html>
<head><title>Website Anggota</title></head>
<body>
  <h1>Selamat datang di Website Laporan</h1>
  <p>Silakan login atau daftar untuk melihat laporan pribadi.</p>

  <!-- Form Registrasi -->
  <h2>Form Registrasi Anggota</h2>
  <form id="registerForm">
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="password" id="regPassword" placeholder="Password" required>
    <button type="submit">Daftar</button>
  </form>
  <p id="registerStatus"></p>

  <!-- Form Login -->
  <h2>Form Login Anggota</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p id="loginStatus"></p>

  <!-- Firebase Config -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "API_KEY_ASLI",
      authDomain: "majesty-club.firebaseapp.com",
      projectId: "majesty-club",
      storageBucket: "majesty-club.appspot.com",
      messagingSenderId: "825135157253",
      appId: "APP_ID_ASLI"
    };
    firebase.initializeApp(firebaseConfig);

    // Script Registrasi
    const registerForm = document.getElementById("registerForm");
    const registerStatus = document.getElementById("registerStatus");
    registerForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;
      firebase.auth().createUserWithEmailAndPassword(email, password)
        .then(() => registerStatus.innerText = "Registrasi berhasil! Silakan login.")
        .catch(error => registerStatus.innerText = "Registrasi gagal: " + error.message);
    });

    // Script Login
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => loginStatus.innerText = "Login berhasil! Selamat datang.")
        .catch(error => loginStatus.innerText = "Login gagal: " + error.message);
    });
  </script>
</body>
</html>
