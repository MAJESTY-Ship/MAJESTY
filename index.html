<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MAJESTY Affiliate Program</title>
</head>
<body>
  <h1>Login Anggota</h1>

  <!-- Form Login -->
  <input type="email" id="email" placeholder="Email Anda">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Masuk</button>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

  <script>
    // Konfigurasi Firebase (ambil dari Firebase Console → Project settings → Web app)
    const firebaseConfig = {
      apiKey: "API_KEY_ANDA",
      authDomain: "PROJECT_ID.firebaseapp.com",
      databaseURL: "https://PROJECT_ID.firebaseio.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    // Fungsi login
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Login berhasil!");
          // Simpan status login ke database (opsional)
          const user = userCredential.user;
          db.ref("members/" + user.uid).set({
            email: user.email,
            lastLogin: new Date().toISOString()
          });
          // Redirect ke halaman member
          window.location.href = "member.html";
        })
        .catch((error) => {
          alert("Login gagal: " + error.message);
        });
    }
  </script>
</body>
</html>
