<!DOCTYPE html>
<html>
<head>
  <title>Login Member</title>
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Halaman Login -->
  <div id="loginPage">
    <h2>Login Member</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- Halaman Aktivasi -->
  <div id="activationPage" class="hidden">
    <h2>Akun Anda masih pending, tunggu verifikasi admin.</h2>
  </div>

  <!-- Dashboard Member -->
  <div id="dashboardPage" class="hidden">
    <h2>Selamat datang di Dashboard Member!</h2>
    <p>Anda sudah berhasil login dan akun aktif ✅</p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // Konfigurasi Firebase (isi sesuai project Anda)
    const firebaseConfig = {
      apiKey: "API_KEY_ANDA",
      authDomain: "majestyaffiliate.firebaseapp.com",
      databaseURL: "https://majestyaffiliate-3f67e-default-rtdb.firebaseio.com",
      projectId: "majestyaffiliate",
      storageBucket: "majestyaffiliate.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fungsi login
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      db.ref('members').once('value').then(snapshot => {
        let found = false;
        snapshot.forEach(child => {
          const member = child.val();
          if(member.username === user && member.password === pass) {
            found = true;
            if(member.active) {
              document.getElementById('loginPage').classList.add('hidden');
              document.getElementById('dashboardPage').classList.remove('hidden');
            } else {
              document.getElementById('loginPage').classList.add('hidden');
              document.getElementById('activationPage').classList.remove('hidden');
            }
          }
        });
        if(!found) alert("Username atau password salah!");
      });
    }
  </script>
</body>
</html>
