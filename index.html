<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Member</title>
</head>
<body>
  <h2>Form Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Masuk</button>
  </form>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>

  <script>
    // Config Firebase dari project Anda
    const firebaseConfig = {
      apiKey: "AIzaSyAWqNCjALX97psJZRLi14y4uRrjeK6Fp",
      authDomain: "majestyaffiliate-3f67e.firebaseapp.com",
      databaseURL: "https://majestyaffiliate-3f67e-default-rtdb.firebaseio.com",
      projectId: "majestyaffiliate-3f67e",
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);

    // Script login
    const auth = firebase.auth();
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Login berhasil!");
          window.location.href = "member.html"; // arahkan ke halaman member
        })
        .catch((error) => {
          alert("Login gagal: " + error.message);
        });
    });
  </script>
</body>
</html>
