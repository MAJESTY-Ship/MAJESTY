<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      margin: 0;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    table {
      border-collapse: collapse;
      width: 90%;
      margin: 20px auto;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #4CAF50;
      color: white;
    }
    button {
      padding: 6px 12px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>
  <h2>Panel Admin</h2>
  <p style="text-align:center;">Daftar member yang menunggu konfirmasi:</p>
  <table id="memberTable"></table>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // Konfigurasi Firebase (isi sesuai project Anda)
    const firebaseConfig = {
      apiKey: "API_KEY_ANDA",
      authDomain: "majestyaffiliate.firebaseapp.com",
      databaseURL: "https://majestyaffiliate-3f67e-default-rtdb.firebaseio.com",
      projectId: "majestyaffiliate",
      storageBucket: "majestyaffiliate.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Baca data members
    db.ref('members').on('value', snapshot => {
      const memberTable = document.getElementById('memberTable');
      memberTable.innerHTML = `
        <tr>
          <th>Nama</th>
          <th>Username</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>`;
      snapshot.forEach(child => {
        const member = child.val();
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${member.nama || '-'}</td>
          <td>${member.username || '-'}</td>
          <td>${member.active ? 'Aktif ✅' : 'Pending'}</td>
          <td>${member.active ? '' : `<button onclick="verifyMember('${child.key}')">Verifikasi</button>`}</td>
        `;
        memberTable.appendChild(row);
      });
    });

    // Fungsi verifikasi
    function verifyMember(memberId) {
      db.ref('members/' + memberId).update({ active: true });
      alert("Member berhasil diverifikasi!");
    }
  </script>
</body>
</html>
