<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #4CAF50; color: white; }
    button { padding: 5px 10px; cursor: pointer; }
    .aktif { background: #4CAF50; color: white; }
    .pending { background: #f44336; color: white; }
  </style>
</head>
<body>
  <h2>Daftar Member</h2>
  <table id="memberTable">
    <tr>
      <th>Nama</th>
      <th>Username</th>
      <th>Status</th>
      <th>Aksi</th>
    </tr>
  </table>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAWqNClALXv97psJZRLiIt4yauRrjeK6Fw",
      authDomain: "majestyaffiliate.firebaseapp.com",
      databaseURL: "https://majestyaffiliate-3f67e-default-rtdb.firebaseio.com",
      projectId: "majestyaffiliate",
      storageBucket: "majestyaffiliate.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Baca data members
    db.ref('members').on('value', snapshot => {
      const memberTable = document.getElementById('memberTable');
      memberTable.innerHTML = `
        <tr>
          <th>Nama</th>
          <th>Username</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      `;
      snapshot.forEach(child => {
        const member = child.val();
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${member.nama}</td>
          <td>${member.username}</td>
          <td>${member.active ? "Aktif" : "Pending"}</td>
          <td>
            <button onclick="verifikasi('${child.key}')">Verifikasi</button>
          </td>
        `;
        memberTable.appendChild(row);
      });
    });

    // Fungsi verifikasi
    function verifikasi(key) {
      db.ref('members/' + key + '/active').set(true);
      alert("Member sudah diverifikasi!");
    }
  </script>
</body>
</html>
